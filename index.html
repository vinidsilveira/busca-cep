<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="container">
        <h1>Busca de CEP</h1>

        <div class="search-area">
            <input type="text" id="cep-input" placeholder="Digite o CEP">
            <button id="search-button">Buscar</button>
        </div>

        <section class="result-card">
            <p><strong>Rua:</strong> <span id="street">-</span></p>
            <p><strong>Bairro:</strong> <span id="district">-</span></p>
            <p><strong>Cidade:</strong> <span id="city">-</span></p>
            <p><strong>Estado:</strong> <span id="state">-</span></p>
        </section>

    </main>
</body>

<script src="js/script.js"></script>

</html>
